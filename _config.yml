theme: jekyll-theme-chirpy

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-paginate

future: true

lang: en
timezone: Europe/Madrid

title: SecAI Journal
tagline: Security & AI — Research, Tools, and Thoughts
description: >-
  A personal journal exploring the intersection of cybersecurity and artificial intelligence.
  CTF writeups, research notes, tool reviews, and AI-powered security techniques.

url: "https://secai-journal.github.io"
baseurl: ""

github:
  username: SecAI-Journal

social:
  name: SecAI Journal
  email: ""
  links:
    - https://github.com/SecAI-Journal

google_site_verification:

google_analytics:
  id:

theme_mode: dark

avatar: /assets/img/avatar.png
toc: true

comments:
  provider: false

assets:
  self_host:
    enabled: false

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

paginate: 10
paginate_path: "/page:num/"

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
